
services:
  api:
    build: .
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    ports:
      - "8000:8000"

  frontend:
    build: .
    command: ["python", "-m", "streamlit", "run", "app.py", "--server.port", "8501"]
    ports:
      - "8501:8501"
    depends_on:
      - api